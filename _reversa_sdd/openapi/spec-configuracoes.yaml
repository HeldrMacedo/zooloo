          description: Sempre uppercase
          example: "GRADE PADRÃO"
        itens:
          type: array
          items:
            $ref: "#/components/schemas/GradeComissaoItem"

    GradeComissaoInput:
      type: object
      required: [descricao]
      properties:
        descricao:
          type: string
          description: Convertido para uppercase
          example: "Grade Padrão"

    GradeComissaoItem:
      type: object
      properties:
        grade_comissao_itens_id:
          type: integer
          example: 10
        grade_comissao_id:
          type: integer
          example: 1
        modalidade_id:
          type: integer
          example: 1
        modalidade_descricao:
          type: string
          description: Descrição do int_jogo vinculado
          example: "Milhar"
