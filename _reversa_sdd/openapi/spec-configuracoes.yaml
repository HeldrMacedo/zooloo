openapi: 3.0.3
info:
  title: Zooloo — API Configurações
  description: |
    APIs REST para os módulos de configuração do Zooloo.

    Cobre: Área Extração, Área Cotação, Área Limite,
    Área Comissão Modalidade, Palpite Cotado, Extração Descarga,
    Parâmetros (singleton) e Grade de Comissão (GAP).

    **Convenções de unicidade:** A maioria dos módulos valida a unicidade
    da combinação de chaves antes de persistir. `ExtracaoDescarga` e
    `PalpiteCotado` verificam tanto na criação quanto na edição;
    `AreaLimite` e `AreaComissaoModalidade` apenas na criação.

    **Área Extração:** usa presença/ausência de registro em vez de campo
    `ativo` — ativar cria registro, desativar faz hard delete.
  version: "1.0.0"
servers:
  - url: http://localhost
    description: Ambiente local (Docker)

tags:
  - name: Área Extração
    description: Quais extrações estão ativas por área (`cfg_area_extracao`)
  - name: Área Cotação
    description: Multiplicadores de premiação por área/extração/modalidade (`cfg_area_cotacao`)
  - name: Área Limite
    description: Limites de aposta por área/modalidade (`cfg_area_limite`)
  - name: Área Comissão Modalidade
    description: Percentuais de comissão por área/modalidade (`cfg_area_comissao_modalidade`)
  - name: Palpite Cotado
    description: Cotações especiais por número/modalidade (`cfg_palpite_cotado`)
  - name: Extração Descarga
    description: Limites de descarga por extração/modalidade (`cfg_extracao_descarga`)
  - name: Parâmetros
    description: Configurações globais da banca — singleton (`cfg_parametros`)
  - name: Grade Comissão
    description: Templates de comissão por modalidade — GAP (`cfg_grade_comissao`)

paths:

  # ─── ÁREA EXTRAÇÃO ───────────────────────────────────────────────────────────

  /api/area-extracoes:
    get:
      tags: [Área Extração]
      summary: Listar extrações com status de ativação por área
      description: |
        Retorna todas as extrações ativas (`cad_extracao.ativo='S'`) indicando
        se cada uma está ativa para a área informada. Equivale ao LEFT JOIN
        entre `cad_extracao` e `cfg_area_extracao`.

        Gerentes autenticados recebem apenas a própria área.
      operationId: areaExtracao_list
      parameters:
        - name: area_id
          in: query
          required: true
          schema:
            type: integer
          description: Área a consultar (obrigatório)
          example: 2
      responses:
        "200":
          description: Lista de extrações com status de ativação
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AreaExtracaoStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/area-extracoes/ativar:
    post:
      tags: [Área Extração]
      summary: Ativar extração para uma área
      description: |
        Se não existe registro → cria com `ativo=true`.
        Se existe com `ativo=false` → atualiza para `ativo=true`.
        Padrão INSERT/UPDATE — não usa campo `ativo` de forma padrão;
        a presença do registro indica ativação.
      operationId: areaExtracao_ativar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaExtracaoToggleInput"
      responses:
        "200":
          description: Extração ativada para a área
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaExtracao"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/area-extracoes/desativar:
    post:
      tags: [Área Extração]
      summary: Desativar extração para uma área
      description: |
        Hard delete do registro em `cfg_area_extracao`.
        Não afeta sorteios já abertos — apenas impede novos bilhetes
        por esta área nesta extração.
      operationId: areaExtracao_desativar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaExtracaoToggleInput"
      responses:
        "204":
          description: Extração desativada (registro deletado)
        "404":
          description: Extração já não estava ativa para esta área

  # ─── ÁREA COTAÇÃO ────────────────────────────────────────────────────────────

  /api/area-cotacaos:
    get:
      tags: [Área Cotação]
      summary: Listar configurações de cotação
      operationId: areaCotacao_list
      parameters:
        - name: area_id
          in: query
          schema:
            type: integer
        - name: extracao_id
          in: query
          schema:
            type: integer
          description: Omitir para listar cotações globais (extracao_id IS NULL)
        - name: modalidade_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de cotações
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCotacaoPage"

    post:
      tags: [Área Cotação]
      summary: Criar configuração de cotação
      description: |
        `extracao_id` opcional — `null` cria cotação global da área para a modalidade.
        Cotação específica por extração sobrepõe a global no `ModalidadeRestService`.

        A combinação (`area_id`, `extracao_id`, `modalidade_id`) deve ser única.
        Para `extracao_id=null` a unicidade é verificada com `IS NULL`.
      operationId: areaCotacao_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaCotacaoInput"
      responses:
        "201":
          description: Cotação criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCotacao"
        "409":
          description: Combinação área/extração/modalidade já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/area-cotacaos/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Área Cotação]
      summary: Obter cotação por ID
      operationId: areaCotacao_get
      responses:
        "200":
          description: Cotação encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCotacao"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Área Cotação]
      summary: Atualizar cotação
      operationId: areaCotacao_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaCotacaoInput"
      responses:
        "200":
          description: Cotação atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaCotacao"
        "409":
          description: Combinação área/extração/modalidade já existe em outro registro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Área Cotação]
      summary: Excluir cotação
      operationId: areaCotacao_delete
      responses:
        "204":
          description: Cotação excluída
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── ÁREA LIMITE ─────────────────────────────────────────────────────────────

  /api/area-limites:
    get:
      tags: [Área Limite]
      summary: Listar limites de aposta
      operationId: areaLimite_list
      parameters:
        - name: area_id
          in: query
          schema:
            type: integer
        - name: modalidade_id
          in: query
          schema:
            type: integer
        - name: limite_palpite_min
          in: query
          schema:
            type: number
          description: Filtro >= limite_palpite
        - name: limite_palpite_max
          in: query
          schema:
            type: number
          description: Filtro <= limite_palpite
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de limites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaLimitePage"

    post:
      tags: [Área Limite]
      summary: Criar limite de aposta
      description: |
        A combinação (`area_id`, `modalidade_id`) deve ser única.
        Unicidade verificada **apenas na criação**.

        Quando não existe registro para a combinação, o `BilheteRestService`
        aplica `cfg_parametros.limite_global` como fallback.
      operationId: areaLimite_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaLimiteInput"
      responses:
        "201":
          description: Limite criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaLimite"
        "409":
          description: Combinação área/modalidade já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/area-limites/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Área Limite]
      summary: Obter limite por ID
      operationId: areaLimite_get
      responses:
        "200":
          description: Limite encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaLimite"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Área Limite]
      summary: Atualizar limite
      description: Unicidade não é re-verificada na edição.
      operationId: areaLimite_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaLimiteInput"
      responses:
        "200":
          description: Limite atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaLimite"
    delete:
      tags: [Área Limite]
      summary: Excluir limite
      operationId: areaLimite_delete
      responses:
        "204":
          description: Limite excluído
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── ÁREA COMISSÃO MODALIDADE ────────────────────────────────────────────────

  /api/area-comissao-modalidades:
    get:
      tags: [Área Comissão Modalidade]
      summary: Listar comissões por modalidade
      operationId: areaComissao_list
      parameters:
        - name: area_id
          in: query
          schema:
            type: integer
        - name: modalidade_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de comissões
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaComissaoPage"

    post:
      tags: [Área Comissão Modalidade]
      summary: Criar configuração de comissão
      description: |
        `comissao` deve estar entre 0 e 100 (percentual).
        A combinação (`area_id`, `modalidade_id`) deve ser única.
        Unicidade verificada **apenas na criação**.
      operationId: areaComissao_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaComissaoInput"
      responses:
        "201":
          description: Comissão criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaComissao"
        "400":
          description: Comissão fora do intervalo 0–100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Combinação área/modalidade já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/area-comissao-modalidades/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Área Comissão Modalidade]
      summary: Obter configuração por ID
      operationId: areaComissao_get
      responses:
        "200":
          description: Configuração encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaComissao"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Área Comissão Modalidade]
      summary: Atualizar comissão
      operationId: areaComissao_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaComissaoInput"
      responses:
        "200":
          description: Comissão atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreaComissao"
        "400":
          description: Comissão fora do intervalo 0–100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Área Comissão Modalidade]
      summary: Excluir configuração
      operationId: areaComissao_delete
      responses:
        "204":
          description: Configuração excluída
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── PALPITE COTADO ──────────────────────────────────────────────────────────

  /api/palpite-cotados:
    get:
      tags: [Palpite Cotado]
      summary: Listar palpites com cotação especial
      operationId: palpiteCotado_list
      parameters:
        - name: modalidade_id
          in: query
          schema:
            type: integer
        - name: palpite
          in: query
          schema:
            type: string
            pattern: "^[0-9]{4}$"
          description: Número exato de 4 dígitos
        - name: ativo
          in: query
          schema:
            type: string
            enum: [S, N]
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de palpites cotados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalpiteCotadoPage"

    post:
      tags: [Palpite Cotado]
      summary: Criar cotação especial
      description: |
        `palpite` deve ter exatamente 4 dígitos numéricos.
        `cotacao` deve estar entre 0 e 100.
        A combinação (`modalidade_id`, `palpite`) deve ser única —
        verificada tanto na criação quanto na edição.

        O `ModalidadeRestService` injeta estes registros na resposta
        de modalidades disponíveis ao app móvel.
      operationId: palpiteCotado_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PalpiteCotadoInput"
      responses:
        "201":
          description: Palpite cotado criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalpiteCotado"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Combinação modalidade/palpite já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/palpite-cotados/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Palpite Cotado]
      summary: Obter palpite cotado por ID
      operationId: palpiteCotado_get
      responses:
        "200":
          description: Palpite cotado encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalpiteCotado"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Palpite Cotado]
      summary: Atualizar palpite cotado
      description: Unicidade re-verificada na edição (exclui o próprio ID).
      operationId: palpiteCotado_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PalpiteCotadoInput"
      responses:
        "200":
          description: Palpite cotado atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalpiteCotado"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Combinação modalidade/palpite já existe em outro registro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Palpite Cotado]
      summary: Excluir palpite cotado
      operationId: palpiteCotado_delete
      responses:
        "204":
          description: Palpite cotado excluído
        "404":
          $ref: "#/components/responses/NotFound"

  /api/palpite-cotados/{id}/toggle-ativo:
    put:
      tags: [Palpite Cotado]
      summary: Alternar ativo/inativo
      operationId: palpiteCotado_toggleAtivo
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Status alterado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalpiteCotado"

  # ─── EXTRAÇÃO DESCARGA ───────────────────────────────────────────────────────

  /api/extracao-descargas:
    get:
      tags: [Extração Descarga]
      summary: Listar limites de descarga
      operationId: extracaoDescarga_list
      parameters:
        - name: extracao_id
          in: query
          schema:
            type: integer
        - name: modalidade_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de limites de descarga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtracaoDescargaPage"

    post:
      tags: [Extração Descarga]
      summary: Criar limite de descarga
      description: |
        `limite_descarga` deve ser maior que zero.
        A combinação (`extracao_id`, `modalidade_id`) deve ser única —
        verificada tanto na criação quanto na edição.

        O `BilheteRestService` verifica este limite por número apostado
        antes de aceitar cada bilhete.
      operationId: extracaoDescarga_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtracaoDescargaInput"
      responses:
        "201":
          description: Limite criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtracaoDescarga"
        "400":
          description: limite_descarga deve ser maior que zero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Combinação extração/modalidade já existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/extracao-descargas/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Extração Descarga]
      summary: Obter limite por ID
      operationId: extracaoDescarga_get
      responses:
        "200":
          description: Limite encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtracaoDescarga"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Extração Descarga]
      summary: Atualizar limite de descarga
      description: Unicidade re-verificada na edição (exclui o próprio ID).
      operationId: extracaoDescarga_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtracaoDescargaInput"
      responses:
        "200":
          description: Limite atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtracaoDescarga"
        "400":
          description: limite_descarga deve ser maior que zero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Combinação extração/modalidade já existe em outro registro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Extração Descarga]
      summary: Excluir limite
      operationId: extracaoDescarga_delete
      responses:
        "204":
          description: Limite excluído
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── PARÂMETROS ──────────────────────────────────────────────────────────────

  /api/parametros:
    get:
      tags: [Parâmetros]
      summary: Obter parâmetros globais da banca
      description: |
        Singleton — sempre retorna o único registro existente em
        `cfg_parametros`. Não há listagem nem criação.
      operationId: parametros_get
      responses:
        "200":
          description: Parâmetros da banca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parametros"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [Parâmetros]
      summary: Atualizar parâmetros globais
      description: |
        Atualiza o registro singleton. `nome_banca` é obrigatório.
        `qtde_num_mi` deve estar entre 4 e 10.
        `qtde_num_ci` deve estar entre 3 e 10.
        `qtde_num_mci` deve estar entre 4 e 10.
      operationId: parametros_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParametrosInput"
      responses:
        "200":
          description: Parâmetros atualizados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parametros"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ─── GRADE COMISSÃO ──────────────────────────────────────────────────────────

  /api/grade-comissaos:
    get:
      tags: [Grade Comissão]
      summary: Listar grades de comissão
      description: GAP — não implementado no Zooloo PHP.
      operationId: gradeComissao_list
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/size"
      responses:
        "200":
          description: Lista de grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissaoPage"

    post:
      tags: [Grade Comissão]
      summary: Criar grade de comissão
      description: |
        GAP — não implementado no Zooloo PHP. `descricao` forçada para
        uppercase. Permissão `PERM_GRADE_COMISSAO` requerida.
      operationId: gradeComissao_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeComissaoInput"
      responses:
        "201":
          description: Grade criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissao"

  /api/grade-comissaos/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Grade Comissão]
      summary: Obter grade por ID
      operationId: gradeComissao_get
      responses:
        "200":
          description: Grade encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissao"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Grade Comissão]
      summary: Atualizar grade
      operationId: gradeComissao_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeComissaoInput"
      responses:
        "200":
          description: Grade atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissao"
    delete:
      tags: [Grade Comissão]
      summary: Excluir grade
      operationId: gradeComissao_delete
      responses:
        "204":
          description: Grade excluída
        "404":
          $ref: "#/components/responses/NotFound"

  /api/grade-comissaos/{id}/itens:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Grade Comissão]
      summary: Listar itens da grade
      operationId: gradeComissaoItens_list
      responses:
        "200":
          description: Itens da grade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeComissaoItem"
    post:
      tags: [Grade Comissão]
      summary: Adicionar item à grade
      description: Associa uma modalidade com percentual de comissão à grade.
      operationId: gradeComissaoItens_create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeComissaoItemInput"
      responses:
        "201":
          description: Item adicionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissaoItem"

  /api/grade-comissaos/{id}/itens/{itemId}:
    parameters:
      - $ref: "#/components/parameters/id"
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    put:
      tags: [Grade Comissão]
      summary: Atualizar item da grade
      operationId: gradeComissaoItens_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeComissaoItemInput"
      responses:
        "200":
          description: Item atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeComissaoItem"
    delete:
      tags: [Grade Comissão]
      summary: Remover item da grade
      operationId: gradeComissaoItens_delete
      responses:
        "204":
          description: Item removido

# ─── COMPONENTS ──────────────────────────────────────────────────────────────

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    size:
      name: size
      in: query
      schema:
        type: integer
        default: 10
        enum: [10, 20, 50, 100]

  responses:
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Dados de entrada inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    # ── ÁREA EXTRAÇÃO ──

    AreaExtracao:
      type: object
      properties:
        area_extracao_id:
          type: integer
          example: 10
        area_id:
          type: integer
          example: 2
        extracao_id:
          type: integer
          example: 5
        ativo:
          type: boolean
          description: true = extração ativa para a área
          example: true

    AreaExtracaoStatus:
      type: object
      description: Extração com indicador de ativação para a área consultada
      properties:
        extracao_id:
          type: integer
          example: 5
        descricao:
          type: string
          example: "TARDE"
        hora_limite:
          type: string
          example: "18:00"
        ativo:
          type: boolean
          description: true = existe registro em cfg_area_extracao para esta área
          example: true

    AreaExtracaoToggleInput:
      type: object
      required: [area_id, extracao_id]
      properties:
        area_id:
          type: integer
          example: 2
        extracao_id:
          type: integer
          example: 5

    # ── ÁREA COTAÇÃO ──

    AreaCotacao:
      type: object
      properties:
        area_cotacao_id:
          type: integer
          example: 15
        area_id:
          type: integer
          example: 2
        extracao_id:
          type: integer
          nullable: true
          description: "null = cotação global da área para a modalidade"
          example: 5
        modalidade_id:
          type: integer
          example: 1
        multiplicador:
          type: number
          format: double
          description: Fator de multiplicação do prêmio
          example: 6000.0

    AreaCotacaoInput:
      type: object
      required: [area_id, modalidade_id, multiplicador]
      properties:
        area_id:
          type: integer
          example: 2
        extracao_id:
          type: integer
          nullable: true
          description: "null = cotação global (sem extração específica)"
          example: null
        modalidade_id:
          type: integer
          example: 1
        multiplicador:
          type: number
          format: double
          minimum: 0.01
          example: 6000.0

    AreaCotacaoPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AreaCotacao"
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ── ÁREA LIMITE ──

    AreaLimite:
      type: object
      properties:
        area_limite_id:
          type: integer
          example: 8
        area_id:
          type: integer
          example: 2
        modalidade_id:
          type: integer
          example: 1
        limite_palpite:
          type: number
          format: double
          description: Valor máximo por palpite. Fallback: cfg_parametros.limite_global
          example: 500.0

    AreaLimiteInput:
      type: object
      required: [area_id, modalidade_id, limite_palpite]
      properties:
        area_id:
          type: integer
          example: 2
        modalidade_id:
          type: integer
          example: 1
        limite_palpite:
          type: number
          format: double
          minimum: 0.01
          example: 500.0

    AreaLimitePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AreaLimite"
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ── ÁREA COMISSÃO MODALIDADE ──

    AreaComissao:
      type: object
      properties:
        area_comissao_modalidade_id:
          type: integer
          example: 6
        area_id:
          type: integer
          example: 2
        modalidade_id:
          type: integer
          example: 1
        comissao:
          type: number
          format: double
          description: Percentual de comissão (0–100)
          example: 5.0

    AreaComissaoInput:
      type: object
      required: [area_id, modalidade_id, comissao]
      properties:
        area_id:
          type: integer
          example: 2
        modalidade_id:
          type: integer
          example: 1
        comissao:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 5.0

    AreaComissaoPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AreaComissao"
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ── PALPITE COTADO ──

    PalpiteCotado:
      type: object
      properties:
        palpite_cotado_id:
          type: integer
          example: 3
        modalidade_id:
          type: integer
          example: 1
        palpite:
          type: string
          pattern: "^[0-9]{4}$"
          description: Número exato de 4 dígitos
          example: "0001"
        cotacao:
          type: number
          format: double
          description: |
            Cotação especial (0–100). Semântica incerta: pode ser percentual
            de ajuste ou multiplicador direto. Verificar com negócio.
          example: 15.0
        ativo:
          type: string
          enum: [S, N]
          example: S

    PalpiteCotadoInput:
      type: object
      required: [modalidade_id, palpite, cotacao]
      properties:
        modalidade_id:
          type: integer
          example: 1
        palpite:
          type: string
          pattern: "^[0-9]{4}$"
          example: "0001"
        cotacao:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 15.0
        ativo:
          type: string
          enum: [S, N]
          default: S

    PalpiteCotadoPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/PalpiteCotado"
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ── EXTRAÇÃO DESCARGA ──

    ExtracaoDescarga:
      type: object
      properties:
        extracao_descarga_id:
          type: integer
          example: 4
        extracao_id:
          type: integer
          example: 5
        modalidade_id:
          type: integer
          example: 1
        limite_descarga:
          type: number
          format: double
          description: Volume máximo acumulado por número antes de bloquear
          example: 10000.0

    ExtracaoDescargaInput:
      type: object
      required: [extracao_id, modalidade_id, limite_descarga]
      properties:
        extracao_id:
          type: integer
          example: 5
        modalidade_id:
          type: integer
          example: 1
        limite_descarga:
          type: number
          format: double
          exclusiveMinimum: 0
          example: 10000.0

    ExtracaoDescargaPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ExtracaoDescarga"
        totalElements:
          type: integer
        totalPages:
          type: integer

