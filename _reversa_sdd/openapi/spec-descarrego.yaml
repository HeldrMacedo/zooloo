openapi: 3.0.3
info:
  title: Zooloo — Descarrego JB
  description: |
    APIs do módulo Descarrego JB — gerenciamento de apostas acima do limite configurado
    em `cfg_extracao_descarga`.

    ## Contexto

    Quando o volume apostado em um número específico ultrapassa o limite definido em
    `cfg_extracao_descarga`, a aposta entra em estado de "descarrego" — fica pendente
    de processamento pelo operador. Este módulo permite visualizar e processar essas
    apostas antes do encerramento do sorteio.

    ## Quatro modos de visualização

    O módulo exibe uma tabela por vez, controlada por flags booleanas no frontend:

    | Flag | Tabela | Ativado por | Endpoint |
    |---|---|---|---|
    | `validDescarrego` | Pendentes — detalhado | Busca Detalhada | `GET api/descarregojb` |
    | `validDescarregoAgrupado` | Pendentes — agrupado | Agrupada | `GET api/descarregoagrupado` |
    | `ValidDescarregado` | Processados — detalhado | Descarregadas Detalhada | `GET api/descarregados` |
    | `ValidDescarregadoAgrupado` | Processados — agrupado | Descarregados Agrupado | `GET api/descarregadosagrupado` |

    ## Bugs documentados

    - **Typo no alerta de sucesso:** "Porcessado com sucesso!" (deveria ser "Processado") 🔴
    - **Bug de habilitação de botão:** `btnProcessar`/`btnProcessarTodas`/`btnDownload`
      são habilitados com base **apenas na última linha** iterada da lista — se o último
      registro tiver `situacao='P'` (processado), os botões ficam desabilitados mesmo que
      haja registros pendentes. 🔴

    ## Restrições de acesso

    - Gerentes/coletores/setoristas: veem apenas sua área
    - Admin (lastName != null): vê todas as áreas
    - Filtro de extração: somente extrações JB (via `extracaoService.queryJb()`)

    ## Contador regressivo

    Após a busca, `#ContentPlaceHolderMaster_demo` exibe o tempo restante até
    `hora_limite` da extração no formato `"Xh Ym Zs para encerrar"`.
    Exibido apenas quando a data pesquisada é hoje. Implementado via `setInterval`.

    ## Auditoria

    Toda operação de processamento deve ser registrada via `POST api/registerLog`:

    | Ação | `acao` | `historico` |
    |---|---|---|
    | Processar individual (modal) | `"Descarrego"` | `"Processar"` |
    | Processar todas — detalhado | `"Descarrego"` | `"Processar Todas"` |
    | Processar todas — agrupado | `"Descarrego"` | `"Processar Todas Agrupado"` |

    ## Escala de confiança
    🟢 CONFIRMADO | 🟡 INFERIDO | 🔴 LACUNA

    > **GAP no Zooloo:** Este módulo completo está ausente no PHP atual.
    > Ver `gap-admin-operacional.md` para detalhes da implementação de referência.
  version: "1.0.0"
  contact:
    name: Projeto Zooloo — Reversa Framework

servers:
  - url: http://localhost
    description: Ambiente local (Docker)

tags:
  - name: Descarrego — Consulta
    description: Listagem de apostas pendentes e já processadas (4 modos)
  - name: Descarrego — Processamento
    description: Processar apostas individualmente ou em lote (4 operações)

paths:

  # ─── CONSULTAS ───────────────────────────────────────────────────────────────

  /api/descarregojb:
    get:
      tags:
        - Descarrego — Consulta
      summary: Listar apostas pendentes de descarrego — detalhado
      description: |
        Retorna apostas que ultrapassaram o limite de `cfg_extracao_descarga` e ainda
        não foram processadas, em visão detalhada (uma linha por aposta).

        Usado quando `validDescarrego = true` (modo "Busca Detalhada").

        **Rodapé frontend:** `totalGeral = SUM(apostado)` calculado no frontend sobre
        todas as linhas retornadas.

        🟢 CONFIRMADO — via descarrego-jb.service.ts resourceUrl
      operationId: listarDescarregoDetalhado
      parameters:
        - $ref: "#/components/parameters/DataParam"
        - $ref: "#/components/parameters/AreaParam"
        - $ref: "#/components/parameters/ExtracaoParam"
      responses:
        "200":
          description: Lista de apostas pendentes de descarrego
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DescarregoItem"
              example:
                - id: 1001
                  data_sorteio: "2026-05-01"
                  apostado: 150.00
                  jogou: "1234"
                  situacao: "A"
                  area: "Centro"
                  extracao: "Tarde"
                - id: 1002
                  data_sorteio: "2026-05-01"
                  apostado: 200.00
                  jogou: "5678"
                  situacao: "A"
                  area: "Centro"
                  extracao: "Tarde"
        "422":
          description: Área não selecionada (gerente sem área)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 422
                message: "Selecione uma área!"

  /api/descarregoagrupado:
    get:
      tags:
        - Descarrego — Consulta
      summary: Listar apostas pendentes de descarrego — agrupado
      description: |
        Retorna apostas pendentes de descarrego agrupadas por número/jogo.
        Permite visualizar o total apostado por número antes de processar em lote.

        Usado quando `validDescarregoAgrupado = true` (modo "Agrupada").

        🟢 CONFIRMADO — via descarrego-jb.service.ts resourceUrlAgrupado
      operationId: listarDescarregoAgrupado
      parameters:
        - $ref: "#/components/parameters/DataParam"
        - $ref: "#/components/parameters/AreaParam"
        - $ref: "#/components/parameters/ExtracaoParam"
      responses:
        "200":
          description: Lista de apostas pendentes agrupadas por número
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DescarregoAgrupadoItem"
              example:
                - jogou: "1234"
                  apostado: 350.00
                  quantidade: 3
                  situacao: "A"
                  area: "Centro"
                  extracao: "Tarde"
        "422":
          description: Área não selecionada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/descarregados:
    get:
      tags:
        - Descarrego — Consulta
      summary: Listar apostas já processadas — detalhado
      description: |
        Retorna apostas que já foram processadas (descarregadas), em visão detalhada.
        Exibido quando `ValidDescarregado = true` (modo "Descarregadas Detalhada").

        **Sem botão Processar** — esta tabela é somente para visualização de histórico.

        🟢 CONFIRMADO — via descarrego-jb.service.ts resourceDescarregadosUrl
      operationId: listarDescarregadosDetalhado
      parameters:
        - $ref: "#/components/parameters/DataParam"
        - $ref: "#/components/parameters/AreaParam"
        - $ref: "#/components/parameters/ExtracaoParam"
      responses:
        "200":
          description: Lista de apostas processadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DescarregadoItem"
              example:
                - data_sorteio: "2026-05-01"
                  usuario: "operador01"
                  apostado: 150.00
                  jogou: "1234"
                  area: "Centro"
                  extracao: "Tarde"

  /api/descarregadosagrupado:
    get:
      tags:
        - Descarrego — Consulta
      summary: Listar apostas já processadas — agrupado
      description: |
        Retorna apostas processadas agrupadas por número/jogo.
        Exibido quando `ValidDescarregadoAgrupado = true` (modo "Descarregados Agrupado").

        🟢 CONFIRMADO — via descarrego-jb.service.ts resourceDescarregadosAgrupadoUrl
      operationId: listarDescarregadosAgrupado
      parameters:
        - $ref: "#/components/parameters/DataParam"
        - $ref: "#/components/parameters/AreaParam"
        - $ref: "#/components/parameters/ExtracaoParam"
      responses:
        "200":
          description: Lista de apostas processadas agrupadas por número
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DescarregadoAgrupadoItem"
              example:
                - jogou: "1234"
                  apostado: 150.00
                  quantidade: 1
                  usuario: "operador01"
                  area: "Centro"
                  extracao: "Tarde"

  # ─── PROCESSAMENTO ───────────────────────────────────────────────────────────

  /api/descarregojb/{userId}/{userName}:
    put:
      tags:
        - Descarrego — Processamento
      summary: Processar aposta individual — detalhado (via modal)
      description: |
        Processa uma aposta de descarrego individual na visão detalhada.
        Chamado pelo modal `DescarregoJbModalComponent` ao confirmar o processamento.

        O `userId` e `userName` são usados para auditoria e identificação do operador
        que realizou o processamento.

        **Após o sucesso:**
        1. Cliente chama `POST api/registerLog` com `{acao:'Descarrego', historico:'Processar'}`
        2. Frontend emite `eventManager.broadcast('descarregoListModification')` para recarregar a lista

        > **Typo no alerta de sucesso:** a mensagem atual do Java exibe
        > "Porcessado com sucesso!" — deve ser corrigida para "Processado" no Zooloo. 🔴

        🟢 CONFIRMADO — via descarrego-jb.service.ts update() + modal component
      operationId: processarDescarregoIndividual
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/UserNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DescarregoInput"
            example:
              id: 1001
              data_sorteio: "2026-05-01"
              jogou: "1234"
              apostado: 150.00
              extracao_id: 3
      responses:
        "200":
          description: Aposta processada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessamentoResponse"
              example:
                message: "Processado com sucesso!"
                id: 1001
        "404":
          description: Aposta não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Aposta já processada ou sorteio encerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/descarregoagrupado/{userId}/{userName}:
    put:
      tags:
        - Descarrego — Processamento
      summary: Processar aposta individual — agrupado (via modal)
      description: |
        Processa uma aposta de descarrego na visão agrupada.
        Chamado pelo modal `DescarregoAgrupadoModalComponent`.

        **Após o sucesso:**
        1. Cliente chama `POST api/registerLog` com `{acao:'Descarrego', historico:'Processar'}`
        2. Frontend recarrega a lista agrupada

        🟢 CONFIRMADO — via descarrego-jb.service.ts updateProcessarAgrupado()
      operationId: processarDescarregoAgrupadoIndividual
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/UserNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DescarregoInput"
            example:
              jogou: "1234"
              apostado: 350.00
              extracao_id: 3
              data_sorteio: "2026-05-01"
      responses:
        "200":
          description: Aposta processada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessamentoResponse"
        "409":
          description: Sorteio encerrado ou apostas já processadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/descarregarTodas/{userId}/{userName}:
    put:
      tags:
        - Descarrego — Processamento
      summary: Processar todas as apostas em lote — detalhado
      description: |
        Processa em lote todas as apostas pendentes de descarrego para a extração e
        data informadas, na visão detalhada.

        Visível apenas quando `btnProcessarTodas = true`. O botão é habilitado com base
        no estado (`situacao`) da última linha da lista — **bug documentado:** se a última
        linha estiver processada (`situacao='P'`), o botão fica desabilitado mesmo que
        existam linhas pendentes anteriores.

        **Após o sucesso:**
        1. Cliente chama `POST api/registerLog` com `{acao:'Descarrego', historico:'Processar Todas'}`
        2. Frontend recarrega a lista

        🟢 CONFIRMADO — via descarrego-jb.component.ts processarTodas()
      operationId: processarTodasDetalhado
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/UserNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessarTodasInput"
            example:
              data_sorteio: "2026-05-01"
              extracao: 3
      responses:
        "200":
          description: Todas as apostas processadas com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessamentoLoteResponse"
              example:
                message: "Processado com sucesso!"
                processadas: 5
        "422":
          description: Nenhuma aposta pendente para processar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/descarregartodasagrupado/{userId}/{userName}:
    put:
      tags:
        - Descarrego — Processamento
      summary: Processar todas as apostas em lote — agrupado
      description: |
        Processa em lote todas as apostas pendentes na visão agrupada.

        Visível apenas quando `btnProcessarTodasAgrupado = true`.

        **Após o sucesso:**
        1. Cliente chama `POST api/registerLog` com `{acao:'Descarrego', historico:'Processar Todas Agrupado'}`
        2. Frontend recarrega a lista agrupada

        🟢 CONFIRMADO — via descarrego-jb.component.ts processarTodasAgrupado()
      operationId: processarTodasAgrupado
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/UserNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessarTodasInput"
            example:
              data_sorteio: "2026-05-01"
              extracao: 3
      responses:
        "200":
          description: Todas as apostas agrupadas processadas com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessamentoLoteResponse"
        "422":
          description: Nenhuma aposta pendente para processar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:

  parameters:

    DataParam:
      name: data
      in: query
      required: false
      description: Data do sorteio (`yyyy-MM-dd`). Padrão implícito: data atual.
      schema:
        type: string
        format: date
        example: "2026-05-01"

    AreaParam:
      name: area
      in: query
      required: false
      description: |
        ID da área (`cad_area.area_id`).
        Obrigatório para gerentes/coletores/setoristas — opcional para admin.
      schema:
        type: integer
        example: 2

    ExtracaoParam:
      name: extracao
      in: query
      required: false
      description: |
        ID da extração (`cad_extracao.extracao_id`).
        Somente extrações do tipo JB são válidas.
      schema:
        type: integer
        example: 3

    UserIdPath:
      name: userId
      in: path
      required: true
      description: ID do usuário que realiza o processamento (para auditoria)
      schema:
        type: integer
        example: 42

    UserNamePath:
      name: userName
      in: path
      required: true
      description: Login/nome do usuário que realiza o processamento (para auditoria)
      schema:
        type: string
        example: "operador01"

  schemas:

    DescarregoItem:
      type: object
      description: |
        Aposta pendente de descarrego — visão detalhada.
        Uma linha por aposta individual.
      properties:
        id:
          type: integer
          description: ID da aposta no sistema
          example: 1001
        data_sorteio:
          type: string
          format: date
          example: "2026-05-01"
        apostado:
          type: number
          format: double
          description: Valor apostado em BRL
          example: 150.00
        jogou:
          type: string
          description: Número apostado (milhar, dezena, etc.)
          example: "1234"
        situacao:
          type: string
          enum: ["A", "P"]
          description: |
            - `A` — Aberto (pendente de processamento); botão "Processar" exibido
            - `P` — Processado
          example: "A"
        area:
          type: string
          description: Nome da área
          example: "Centro"
        extracao:
          type: string
          description: Descrição da extração
          example: "Tarde"

    DescarregoAgrupadoItem:
      type: object
      description: |
        Apostas pendentes de descarrego agrupadas por número/jogo.
        Soma o total apostado no mesmo número.
      properties:
        jogou:
          type: string
          description: Número apostado
          example: "1234"
        apostado:
          type: number
          format: double
          description: Valor total apostado no número (soma de todas as apostas agrupadas)
          example: 350.00
        quantidade:
          type: integer
          description: Quantidade de apostas no número
          example: 3
        situacao:
          type: string
          enum: ["A", "P"]
          example: "A"
        area:
          type: string
          example: "Centro"
        extracao:
          type: string
          example: "Tarde"

    DescarregadoItem:
      type: object
      description: |
        Aposta já processada (descarregada) — visão detalhada.
        Somente para visualização; sem botão Processar.
      properties:
        data_sorteio:
          type: string
          format: date
          example: "2026-05-01"
        usuario:
          type: string
          description: Login do usuário que processou a aposta
          example: "operador01"
        apostado:
          type: number
          format: double
          description: Valor apostado em BRL
          example: 150.00
        jogou:
          type: string
          description: Número apostado
          example: "1234"
        area:
          type: string
          example: "Centro"
        extracao:
          type: string
          example: "Tarde"

    DescarregadoAgrupadoItem:
      type: object
      description: Apostas processadas agrupadas por número/jogo
      properties:
        jogou:
          type: string
          example: "1234"
        apostado:
          type: number
          format: double
          example: 150.00
        quantidade:
          type: integer
          example: 1
        usuario:
          type: string
          description: Login do usuário que processou
          example: "operador01"
        area:
          type: string
          example: "Centro"
        extracao:
          type: string
          example: "Tarde"

    DescarregoInput:
      type: object
      description: Payload para processar uma aposta individual de descarrego
      required:
        - data_sorteio
        - extracao_id
      properties:
        id:
          type: integer
          description: ID da aposta (necessário na visão detalhada)
          example: 1001
        data_sorteio:
          type: string
          format: date
          example: "2026-05-01"
        jogou:
          type: string
          description: Número apostado
          example: "1234"
        apostado:
          type: number
          format: double
          example: 150.00
        extracao_id:
          type: integer
          description: ID da extração
          example: 3

    ProcessarTodasInput:
      type: object
      description: Payload para processar todas as apostas pendentes em lote
      required:
        - data_sorteio
        - extracao
      properties:
        data_sorteio:
          type: string
          format: date
          description: Data do sorteio alvo
          example: "2026-05-01"
        extracao:
          type: integer
          description: ID da extração alvo
          example: 3

    ProcessamentoResponse:
      type: object
      description: Resposta de processamento individual
      properties:
        message:
          type: string
          description: |
            Mensagem de retorno.
            > **Atenção:** o Java atual retorna "Porcessado com sucesso!" (typo).
            > Corrigir para "Processado com sucesso!" no Zooloo. 🔴
          example: "Processado com sucesso!"
        id:
          type: integer
          description: ID da aposta processada
          example: 1001

    ProcessamentoLoteResponse:
      type: object
      description: Resposta de processamento em lote
      properties:
        message:
          type: string
          example: "Processado com sucesso!"
        processadas:
          type: integer
          description: Quantidade de apostas processadas no lote
          example: 5

    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 422
        message:
          type: string
          example: "Selecione uma área!"

  # ─── NOTA: PDF (download) ─────────────────────────────────────────────────────
  # O frontend gera o PDF via jsPDF diretamente no browser — sem endpoint REST.
  # Colunas do PDF: # | Jogo | Valor
  # Cabeçalho: parametro.nomeBanca
  # Gerado pelo componente descarrego-jb.component.ts (downloadPDF / downloadPDFAgrupado)
  # 🟢 CONFIRMADO — nenhum endpoint de backend necessário para PDF

  # ─── NOTA: register_log ────────────────────────────────────────────────────────
  # Todas as operações PUT devem ser acompanhadas de POST api/registerLog.
  # O register_log coleta o IP via HTTP externo api.ipify.org — dependência de internet.
  # 🔴 LACUNA — ver gap-admin-operacional.md para detalhes de segurança
