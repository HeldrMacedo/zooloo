openapi: 3.0.3
info:
  title: Zooloo — Relatórios Financeiros e Operacionais
  description: |
    APIs de relatórios financeiros consolidados, comissão, movimentos por extração
    e mapa de apostas (controle de risco).

    ## Módulos cobertos

    | Módulo Java | Título na tela | Endpoint |
    |---|---|---|
    | `geral-financeiro` | Movimento Geral Caixa | `GET api/geralfinanceirojb` ¹ |
    | `geral-caixajb` | Movimento Geral Financeiro | `GET api/geralCaixajb` |
    | `geral-comissao` | Geral Comissão (2 modos) | `GET api/geralvendedor` + `GET api/geralarea` |
    | `geral-extracaojb` | Movimento Geral Extração (JB) | `GET api/geralExtracaojb` |
    | `geral-extracao` | Geral Extração (Bilhetinho) | `GET api/geralExtracao` |
    | `geral-vendas-extracao` | Mov. Geral Vendas Extração | `GET api/geralvendasextracao` |
    | `mapa-apostas` | Mapa de Apostas | `GET api/mapaapostas` |

    ¹ O endpoint Java usa `api/getalfinanceirojb` (**typo "getal"**) — o Zooloo deve
    implementar como `api/geralfinanceirojb`. Ver nota RN-GF-05 em gap-relatorios-vendas.md.

    ## Diferenças entre geral-financeiro e geral-caixajb

    | Aspecto | geral-financeiro (Mov. Geral Caixa) | geral-caixajb (Mov. Geral Financeiro) |
    |---|---|---|
    | Agrupamento | Por vendedor | Por área + vendedor |
    | Colunas | 8 (inclui Prêmio Pago Terceiros) | 9 (inclui Valor Prêmio + Diferença) |
    | Colunas calculadas no template | 2 (Total P. Pagos + Total) | 2 (Total Geral + Diferença) |

    ## Colunas calculadas no frontend (não retornadas pela API)

    - `geral-financeiro`: "Total de P. Pagos" = `premioPagos + premioPagosTerceiros`; "Total" = `liquido - (premioPagos + premioPagosTerceiros)`
    - `geral-caixajb`: "Total Geral" = `total - premio`; "Diferença" = `premio - premioPago`
    - `geral-comissao`: "Líquido" = `total - comissao`

    ## Escala de confiança
    🟢 CONFIRMADO | 🟡 INFERIDO | 🔴 LACUNA

    > **GAP no Zooloo:** Todos esses módulos estão ausentes no PHP atual.
    > Ver `gap-relatorios-vendas.md`, `gap-relatorios-operacionais.md`,
    > `gap-relatorios-extracao.md` e `gap-mapa-apostas.md`.
  version: "1.0.0"
  contact:
    name: Projeto Zooloo — Reversa Framework

servers:
  - url: http://localhost
    description: Ambiente local (Docker)

tags:
  - name: Caixa por Vendedor
    description: Movimento Geral Caixa — caixa detalhada por vendedor com prêmios pagos
  - name: Financeiro por Área
    description: Movimento Geral Financeiro — financeiro por área e vendedor com prêmios
  - name: Comissão
    description: Geral Comissão — dois modos mutuamente exclusivos (por vendedor ou por área)
  - name: Extração
    description: Movimentos agrupados por extração (JB, Bilhetinho, e vendas gerais)
  - name: Mapa de Apostas
    description: Controle de risco preventivo — volume de apostas por número/palpite

paths:

  # ─── MOVIMENTO GERAL CAIXA (geral-financeiro) ────────────────────────────────

  /api/geralfinanceirojb:
    get:
      tags:
        - Caixa por Vendedor
      summary: Movimento Geral Caixa — caixa por vendedor no período
      description: |
        Retorna o resumo financeiro por vendedor no período: apurado, comissão, líquido,
        prêmios pagos pelo próprio vendedor e prêmios pagos de bilhetes de outros vendedores.

        **Colunas calculadas no frontend** (não retornadas pela API):
        - `Total de P. Pagos = premioPagos + premioPagosTerceiros`
        - `Total = liquido - (premioPagos + premioPagosTerceiros)`

        **Totalização no rodapé** (7 valores somados no frontend):
        `totalApurado, totalComissao, totalLiquido, totalPremioPago, totalPremioPagoTerceiro,
        + as 2 colunas calculadas`

        > **Typo no Java:** endpoint implementado como `api/getalfinanceirojb` ("getal" em vez
        > de "geral"). O Zooloo **deve** implementar com a grafia correta `geralfinanceirojb`. 🔴

        🟢 CONFIRMADO — via geral-financeiro.service.ts (resourceUrl)
      operationId: geralFinanceiroJb
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/ComboParam"
        - $ref: "#/components/parameters/AreaParam"
      responses:
        "200":
          description: Caixa por vendedor no período
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralFinanceiroItem"
              example:
                - vendedorDescricao: "João Silva"
                  apuracao: 5000.00
                  comissao: 500.00
                  liquido: 4500.00
                  premioPagos: 200.00
                  premioPagosTerceiros: 50.00
        "422":
          description: Área não selecionada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 422
                message: "Selecione uma área!"

  # ─── MOVIMENTO GERAL FINANCEIRO (geral-caixajb) ──────────────────────────────

  /api/geralCaixajb:
    get:
      tags:
        - Financeiro por Área
      summary: Movimento Geral Financeiro — financeiro por área e vendedor
      description: |
        Relatório financeiro com visão de área E vendedor, incluindo prêmio a pagar e
        prêmio já pago. Mais detalhado que o `geral-financeiro`.

        **Colunas calculadas no frontend** (não retornadas pela API):
        - `Total Geral = total - premio`
        - `Diferença = premio - premioPago`

        **Totalização no rodapé** (frontend):
        `totalApurado, totalComissao, total, premio, totalGeral, premioPago`

        > **Nota de nomenclatura:** endpoint usa camelCase com 'C' maiúsculo (`geralCaixajb`).
        > Manter exatamente esta capitalização no Zooloo. 🟢

        🟢 CONFIRMADO — via geral-caixajb.service.ts (resourceUrl)
      operationId: geralCaixaJb
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/ComboParam"
        - $ref: "#/components/parameters/AreaParam"
      responses:
        "200":
          description: Financeiro por área e vendedor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralCaixaJbItem"
              example:
                - area: "Centro"
                  vendedor: "João Silva"
                  apurado: 5000.00
                  comissao: 500.00
                  total: 4500.00
                  premio: 2000.00
                  premioPago: 1800.00
        "422":
          description: Área não selecionada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── GERAL COMISSÃO (geral-comissao) ─────────────────────────────────────────

  /api/geralvendedor:
    get:
      tags:
        - Comissão
      summary: Geral Comissão — modo Vendedor
      description: |
        Retorna comissão agrupada por `(vendedor, extração, modalidade)`.

        Ativado pelo botão "Geral Vendedor" — define `vendedorValid=true, areaValid=false`.
        Exibido quando `vendedorValid=true`. As duas tabelas (vendedor e área) são
        mutuamente exclusivas.

        **Líquido calculado no frontend:** `liquido = total - comissao`
        **Totalização:** `totalVendedor = SUM(total)`, `totalComissaoVendedor = SUM(comissao)`

        🟢 CONFIRMADO — via geral-comissao.service.ts (resourceUrl = 'api/geralvendedor')
      operationId: geralComissaoVendedor
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/AreaParam"
        - name: extracao
          in: query
          required: false
          description: ID da extração. Omitir = todas.
          schema:
            type: integer
            example: 3
        - name: vendedor
          in: query
          required: false
          description: ID do vendedor. Omitir = todos.
          schema:
            type: integer
            example: 10
        - name: modalidade
          in: query
          required: false
          description: ID da modalidade. Filtrado via `currentAccount.filtro_banca`.
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Comissão agrupada por vendedor/extração/modalidade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralComissaoItem"
              example:
                - agrupador: "João Silva"
                  extracao: "Tarde"
                  modalidade: "Milhar"
                  total: 5000.00
                  comissao: 500.00

  /api/geralarea:
    get:
      tags:
        - Comissão
      summary: Geral Comissão — modo Área
      description: |
        Retorna comissão agrupada por `(área, extração, modalidade)`.

        Ativado pelo botão "Geral Area" — define `vendedorValid=false, areaValid=true`.
        Exibido quando `areaValid=true`. Mutuamente exclusivo com o modo Vendedor.

        **Líquido calculado no frontend:** `liquido = total - comissao`
        **Totalização:** `totalArea = SUM(total)`, `totalComissaoArea = SUM(comissao)`

        🟢 CONFIRMADO — via geral-comissao.service.ts (resourceUrlArea = 'api/geralarea')
      operationId: geralComissaoArea
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/AreaParam"
        - name: extracao
          in: query
          required: false
          schema:
            type: integer
            example: 3
        - name: modalidade
          in: query
          required: false
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Comissão agrupada por área/extração/modalidade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralComissaoItem"
              example:
                - agrupador: "Centro"
                  extracao: "Tarde"
                  modalidade: "Milhar"
                  total: 12000.00
                  comissao: 1200.00

  # ─── RELATÓRIOS POR EXTRAÇÃO ─────────────────────────────────────────────────

  /api/geralExtracaojb:
    get:
      tags:
        - Extração
      summary: Movimento Geral Extração — JB
      description: |
        Retorna movimentos de JB agrupados por extração e vendedor no período.

        **Totalização no rodapé** (frontend — 5 colunas):
        `totalApurado, totalComissao, totalLiquido, totalPremio, total`

        **Restrição de área:** coletor/setorista — restrito; admin — "TODAS".

        🟢 CONFIRMADO — via geral-extracaojb.service.ts
      operationId: geralExtracaoJb
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/AreaParam"
        - name: extracao
          in: query
          required: false
          description: ID da extração JB. Omitir = todas.
          schema:
            type: integer
            example: 3
      responses:
        "200":
          description: Movimentos JB agrupados por extração/vendedor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralExtracaoItem"
              example:
                - extracao: "Tarde"
                  vendedor: "João Silva"
                  apurado: 5000.00
                  comissao: 500.00
                  liquido: 4500.00
                  premio: 2000.00
                  total: 2500.00
        "422":
          description: Área não selecionada ou extração inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 422
                message: "Selecione uma extração!"

  /api/geralExtracao:
    get:
      tags:
        - Extração
      summary: Geral Extração — Bilhetinho (sem totalização)
      description: |
        Retorna movimentos de **Bilhetinho** agrupados por extração e vendedor.

        **Diferenças em relação ao `geralExtracaojb`:**
        - Sem restrição de área por perfil — **todos** os perfis veem todas as áreas
        - **Sem totalização no rodapé** — apenas listagem
        - Filtra somente extrações Bilhetinho (`extracaoService.queryBilhetinho()`)
        - **Bug de janeiro presente:** `diaAtual()` pode preencher datas incorretas em Janeiro 🔴

        🟢 CONFIRMADO — via geral-extracao.service.ts
      operationId: geralExtracaoBilhetinho
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - name: area
          in: query
          required: false
          description: ID da área. Sem restrição por perfil — campo opcional para todos.
          schema:
            type: integer
            example: 2
        - name: extracao
          in: query
          required: false
          description: ID da extração Bilhetinho.
          schema:
            type: integer
            example: 5
      responses:
        "200":
          description: Movimentos Bilhetinho agrupados por extração/vendedor (sem total)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralExtracaoItem"

  /api/geralvendasextracao:
    get:
      tags:
        - Extração
      summary: Movimento Geral Vendas Extração — totais por extração
      description: |
        Retorna o total de vendas por extração no período — visão simplificada com apenas
        2 colunas: Extração e Total.

        **Sem filtro de extração** — exibe todas as extrações do período.
        **Filtro de vendedor** (com AJAX ao mudar área): opcional.

        **Totalização:** `totalVenda = SUM(total)` calculado no frontend.

        🟢 CONFIRMADO — via geral-vendas-extracao.service.ts
      operationId: geralVendasExtracao
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/AreaParam"
        - name: vendedor
          in: query
          required: false
          description: ID do vendedor. Recarregado via AJAX ao mudar área.
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: Totais de vendas por extração
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeralVendasExtracaoItem"
              example:
                - descricao: "Federal"
                  total: 3200.00
                - descricao: "Tarde"
                  total: 5000.00
                - descricao: "Noite"
                  total: 4100.00
        "422":
          description: Área não selecionada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── MAPA DE APOSTAS ─────────────────────────────────────────────────────────

  /api/mapaapostas:
    get:
      tags:
        - Mapa de Apostas
      summary: Mapa de Apostas — volume por número/palpite (controle de risco)
      description: |
        Retorna o volume de apostas consolidado por palpite para uma extração e modalidade
        específicas — ferramenta de controle de risco **preventivo**.

        **Diferença do Descarrego:** o Mapa é preventivo (qualquer momento, somente leitura);
        o Descarrego é reativo (apostas que já ultrapassaram `cfg_extracao_descarga`).

        ## Filtro de modalidade

        O combo de modalidade exibe apenas os 4 tipos mapeáveis para bicho no JB:

        | `int_jogo.descricao` | Palpite |
        |---|---|
        | `MILHAR` | 4 dígitos — bicho pelos 2 últimos |
        | `CENTENA` | 3 dígitos — bicho pelos 2 últimos |
        | `DEZENA` | 2 dígitos — bicho diretamente |
        | `GRUPO` | 2 dígitos — grupo 01–25 = bicho diretamente |

        ## Campo `bicho`

        Derivado pelo backend a partir do palpite usando a mesma lógica `dezmilhar → grupo → animal`
        documentada em `resultado.md`. Campo não existe em `mov_jb_sort_palpite` — calculado na query.

        ## Ordenação (`ordem`)

        | Valor | Ordenação |
        |---|---|
        | `0` | Por palpite (padrão) |
        | `1` | Por quantidade de jogos (descendente) |
        | `2` | Por valor total (descendente) |

        **Totalização:** `SUM(total)` de todos os registros — calculada no frontend.

        🟢 CONFIRMADO — via mapa-apostas.service.ts + mapa-apostas.component.ts
      operationId: mapaApostas
      parameters:
        - $ref: "#/components/parameters/DataInicialParam"
        - $ref: "#/components/parameters/DataFinalParam"
        - $ref: "#/components/parameters/AreaParam"
        - name: extracao
          in: query
          required: true
          description: ID da extração. **Obrigatório** — erro HTTP se ausente.
          schema:
            type: integer
            example: 3
        - name: modalidade
          in: query
          required: true
          description: |
            ID da modalidade. **Obrigatório** — apenas MILHAR, CENTENA, DEZENA ou GRUPO.
            Erro HTTP se ausente ou tipo inválido.
          schema:
            type: integer
            example: 1
        - name: ordem
          in: query
          required: false
          description: Critério de ordenação — 0=Palpite (padrão), 1=Qtd jogos, 2=Valor total
          schema:
            type: integer
            enum: [0, 1, 2]
            default: 0
            example: 0
      responses:
        "200":
          description: Mapa de apostas por palpite/bicho
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapaApostasItem"
              example:
                - bicho: "COBRA"
                  palpite: "1234"
                  jogos: 15
                  total: 750.00
                - bicho: "COBRA"
                  palpite: "3456"
                  jogos: 8
                  total: 400.00
                - bicho: "GALO"
                  palpite: "5023"
                  jogos: 3
                  total: 150.00
        "422":
          description: Extração ou modalidade não selecionadas; área não selecionada para gerente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                sem_extracao:
                  summary: Extração/modalidade ausente
                  value:
                    status: 422
                    message: "Escolha uma Extração e Modalidade!"
                sem_area:
                  summary: Área não selecionada (gerente)
                  value:
                    status: 422
                    message: "Selecione uma área!"

components:

  parameters:

    DataInicialParam:
      name: dataInicial
      in: query
      required: false
      description: Data inicial do período (`yyyy-MM-dd`). Padrão implícito: data atual.
      schema:
        type: string
        format: date
        example: "2026-05-01"

    DataFinalParam:
      name: dataFinal
      in: query
      required: false
      description: Data final do período (`yyyy-MM-dd`). Padrão implícito: data atual.
      schema:
        type: string
        format: date
        example: "2026-05-01"

    ComboParam:
      name: combo
      in: query
      required: false
      description: |
        ID do tipo de jogo via combo dinâmico (`loadParametro()` de `cfg_parametros`).
        Omitir = todos os tipos ativos. Enviado automaticamente se apenas 1 jogo está ativo.
      schema:
        type: integer
        example: 1

    AreaParam:
      name: area
      in: query
      required: false
      description: |
        ID da área. Obrigatório para gerentes/coletores/setoristas.
        Admin pode omitir para ver "TODAS".
      schema:
        type: integer
        example: 2

  schemas:

    GeralFinanceiroItem:
      type: object
      description: |
        Caixa por vendedor — usado em `geral-financeiro` (Movimento Geral Caixa).
        Colunas "Total de P. Pagos" e "Total" são calculadas no frontend.
      properties:
        vendedorDescricao:
          type: string
          description: Nome do vendedor
          example: "João Silva"
        apuracao:
          type: number
          format: double
          description: Total apostado (excluindo cancelados) em BRL
          example: 5000.00
        comissao:
          type: number
          format: double
          example: 500.00
        liquido:
          type: number
          format: double
          description: apuracao - comissao
          example: 4500.00
        premioPagos:
          type: number
          format: double
          description: Prêmios pagos pelo próprio vendedor em BRL
          example: 200.00
        premioPagosTerceiros:
          type: number
          format: double
          description: Prêmios pagos de bilhetes de outros vendedores em BRL
          example: 50.00

    GeralCaixaJbItem:
      type: object
      description: |
        Financeiro por área e vendedor — usado em `geral-caixajb` (Movimento Geral Financeiro).
        Colunas "Total Geral" e "Diferença" são calculadas no frontend.
      properties:
        area:
          type: string
          description: Nome da área
          example: "Centro"
        vendedor:
          type: string
          description: Nome do vendedor
          example: "João Silva"
        apurado:
          type: number
          format: double
          description: Total apostado em BRL
          example: 5000.00
        comissao:
          type: number
          format: double
          example: 500.00
        total:
          type: number
          format: double
          description: apurado - comissao (líquido)
          example: 4500.00
        premio:
          type: number
          format: double
          description: Valor total de prêmios a pagar em BRL
          example: 2000.00
        premioPago:
          type: number
          format: double
          description: Prêmios efetivamente pagos em BRL
          example: 1800.00

    GeralComissaoItem:
      type: object
      description: |
        Item de comissão — usado tanto no modo Vendedor (`geralvendedor`)
        quanto no modo Área (`geralarea`). Campo `agrupador` contém
        nome do vendedor ou nome da área conforme o endpoint.
        Campo "Líquido" calculado no frontend: `total - comissao`.
      properties:
        agrupador:
          type: string
          description: Nome do vendedor (geralvendedor) ou nome da área (geralarea)
          example: "João Silva"
        extracao:
          type: string
          description: Descrição da extração
          example: "Tarde"
        modalidade:
          type: string
          description: Nome da modalidade
          example: "Milhar"
        total:
          type: number
          format: double
          description: Total apostado em BRL
          example: 5000.00
        comissao:
          type: number
          format: double
          description: Comissão em BRL
          example: 500.00

    GeralExtracaoItem:
      type: object
      description: |
        Movimento por extração e vendedor.
        Usado em `geralExtracaojb` (com totalização) e `geralExtracao` (sem totalização).
      properties:
        extracao:
          type: string
          description: Descrição da extração
          example: "Tarde"
        vendedor:
          type: string
          description: Nome do vendedor
          example: "João Silva"
        apurado:
          type: number
          format: double
          example: 5000.00
        comissao:
          type: number
          format: double
          example: 500.00
        liquido:
          type: number
          format: double
          description: apurado - comissao
          example: 4500.00
        premio:
          type: number
          format: double
          description: Prêmios pagos em BRL
          example: 2000.00
        total:
          type: number
          format: double
          description: liquido - premio
          example: 2500.00

    GeralVendasExtracaoItem:
      type: object
      description: Total de vendas por extração — apenas 2 campos
      properties:
        descricao:
          type: string
          description: Nome da extração
          example: "Tarde"
        total:
          type: number
          format: double
          description: Total apostado na extração no período em BRL
          example: 5000.00

    MapaApostasItem:
      type: object
      description: |
        Volume de apostas em um palpite específico.
        Campo `bicho` é derivado pelo backend a partir da lógica de grupos JB
        (documentada em resultado.md) — não existe na tabela `mov_jb_sort_palpite`.
      properties:
        bicho:
          type: string
          description: Nome do animal correspondente ao grupo do palpite
          example: "COBRA"
        palpite:
          type: string
          description: |
            Número apostado:
            - Milhar: 4 dígitos
            - Centena: 3 dígitos
            - Dezena/Grupo: 2 dígitos
          example: "1234"
        jogos:
          type: integer
          description: Quantidade de apostas distintas neste palpite
          example: 15
        total:
          type: number
          format: double
          description: Soma de `valor_palpite` para este palpite em BRL
          example: 750.00

    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 422
        message:
          type: string
          example: "Selecione uma área!"
