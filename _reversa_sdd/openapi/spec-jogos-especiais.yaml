openapi: 3.0.3
info:
  title: Zooloo — Jogos Especiais (Bilhetinho, Quininha, Seninha, Lotinha, Milhar Premiada)
  description: |
    APIs de configuração e lançamento de resultado dos jogos especiais da banca.

    ## Jogos cobertos

    | Jogo | Código (`int_jogo`) | Tabela de config | Endpoint config | Endpoint resultado |
    |---|---|---|---|---|
    | Bilhetinho | `BIL` | `cad_modalidade_bilhetinho` | `GET/PUT api/bilhetinhos` | — (sem tela própria) |
    | Quininha | `QUI` | `cad_modalidade` | `GET api/quininhamodalidade` 🟡 | `GET/PUT api/quininha` |
    | Seninha | `SEN` | `cad_modalidade` | `GET api/seninhamodalidade` 🟡 | `GET/PUT api/seninha` |
    | Lotinha | `LOT` | `cad_modalidade` | `GET api/lotinhamodalidade` 🟡 | `GET/PUT api/lotinha` |
    | Milhar Premiada | `MBP` 🟡 | `cad_modalidade` | `GET/PUT api/milharpremiada` | — (sem tela própria) |

    ## Feature flags em `cfg_parametros`

    | Flag | Jogo habilitado |
    |---|---|
    | `ativo_bilhetinho` | Bilhetinho aceita apostas no app |
    | `ativo_quininha` | Quininha aceita apostas no app |
    | `ativo_seninha` | Seninha aceita apostas no app |
    | `ativo_lotinha` | Lotinha aceita apostas no app (campo `ativo_lotinha` 🟡) |

    ## Formato dos números sorteados (Quininha/Seninha/Lotinha)

    Todos usam dezenas de 2 dígitos separadas por vírgula:

    | Jogo | Dezenas | Máscara de entrada | Exemplo |
    |---|---|---|---|
    | Quininha | 5 | `00,00,00,00,00` | `01,15,22,34,47` |
    | Seninha | 6 | `00,00,00,00,00,00` | `01,15,22,34,47,58` |
    | Lotinha | 15 | `00,00,...,00` (15 pares) | `01,02,03,...,15` |

    ## Triggers do banco acionadas ao fechar sorteio

    | Jogo | Trigger |
    |---|---|
    | Quininha / Seninha | `trg_mv_sorteio_verifica_ganhadores_qui_sen` |
    | Lotinha | `trg_mv_sorteio_verifica_ganhadores_lotinha` |

    ## Diferença entre Bilhetinho e Milhar Premiada (configuração)

    | Aspecto | Bilhetinho | Milhar Premiada |
    |---|---|---|
    | Tabela | `cad_modalidade_bilhetinho` (PK composta `modalidade_id + colocacao`) | `cad_modalidade` (campos extras) |
    | Multiplicadores no modelo Angular | Achatados: `multiplicador01..05` | Achatados: `multiplicadorColocacao01..05` |
    | Multiplicadores no banco | Uma linha por colocação | Campos na mesma linha |

    ## Escala de confiança
    🟢 CONFIRMADO | 🟡 INFERIDO | 🔴 LACUNA

    > **GAP no Zooloo:** Todos esses módulos estão ausentes no PHP atual.
    > Ver `gap-bilhetinho.md`, `gap-quininha-seninha-lotinha.md` e `gap-milhar-premiada.md`.
  version: "1.0.0"
  contact:
    name: Projeto Zooloo — Reversa Framework

servers:
  - url: http://localhost
    description: Ambiente local (Docker)

tags:
  - name: Bilhetinho — Configuração
    description: Listar e atualizar modalidades de Bilhetinho (`cad_modalidade_bilhetinho`)
  - name: Quininha — Configuração
    description: Listar e atualizar modalidades de Quininha (prêmios por colocação)
  - name: Quininha — Resultado
    description: Lançar, limpar e encerrar resultado de Quininha
  - name: Seninha — Configuração
    description: Listar e atualizar modalidades de Seninha (prêmios por colocação)
  - name: Seninha — Resultado
    description: Lançar, limpar e encerrar resultado de Seninha
  - name: Lotinha — Configuração
    description: Listar e atualizar modalidades de Lotinha (cotação única)
  - name: Lotinha — Resultado
    description: Lançar, limpar e encerrar resultado de Lotinha
  - name: Milhar Premiada — Configuração
    description: Listar e atualizar configuração de Milhar Premiada

paths:

  # ─── BILHETINHO (CONFIGURAÇÃO) ───────────────────────────────────────────────

  /api/bilhetinhos:
    get:
      tags:
        - Bilhetinho — Configuração
      summary: Listar modalidades de Bilhetinho
      description: |
        Retorna todas as modalidades de Bilhetinho configuradas em
        `cad_modalidade_bilhetinho`. O backend agrega as 5 colocações de cada modalidade
        em um único objeto Angular (`IBilhetinho`) com campos `multiplicador01..05`.

        **Sem filtros** — retorna todas as modalidades.
        **Sem paginação** — lista completa (número pequeno de registros).

        A tela exibe a lista e ao clicar "Editar", o formulário aparece inline
        no topo da página — sem rota separada de form.

        🟢 CONFIRMADO — via bilhetinho.service.ts (resourceUrl = 'api/bilhetinhos')
      operationId: listarBilhetinhos
      responses:
        "200":
          description: Lista de modalidades de Bilhetinho
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BilhetinhoModalidade"
              example:
                - id: 1
                  apresentacao: "Bilhetinho Milhar"
                  multiplicador: 1.00
                  multiplicador01: 4000.00
                  multiplicador02: 2000.00
                  multiplicador03: 1000.00
                  multiplicador04: 500.00
                  multiplicador05: 250.00
                  limitePalpite: 100.00
                  limiteDescarga: 500.00
                  limiteAceite: 1000.00
                  ordem: 1
                  ativo: true
                  intJogo:
                    id: 5
                    descricao: "BIL"

    put:
      tags:
        - Bilhetinho — Configuração
      summary: Atualizar modalidade de Bilhetinho
      description: |
        Atualiza configuração de uma modalidade de Bilhetinho.
        O backend desagrega o objeto achatado (com `multiplicador01..05`) de volta
        para as 5 linhas de `cad_modalidade_bilhetinho` (uma por colocação).

        **Somente edição** — não há criação de registros. Registros são pré-seeded.

        🟢 CONFIRMADO — via bilhetinho.service.ts (update method)
      operationId: atualizarBilhetinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BilhetinhoModalidade"
            example:
              id: 1
              apresentacao: "Bilhetinho Milhar"
              multiplicador: 1.00
              multiplicador01: 4500.00
              multiplicador02: 2000.00
              multiplicador03: 1000.00
              multiplicador04: 500.00
              multiplicador05: 250.00
              limitePalpite: 100.00
              limiteDescarga: 500.00
              limiteAceite: 1000.00
              ordem: 1
              ativo: true
      responses:
        "200":
          description: Modalidade atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BilhetinhoModalidade"
        "422":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── QUININHA (CONFIGURAÇÃO) ─────────────────────────────────────────────────

  /api/quininhamodalidade:
    get:
      tags:
        - Quininha — Configuração
      summary: Listar modalidades de Quininha
      description: |
        Retorna modalidades de Quininha filtradas de `cad_modalidade` por `int_jogo.codigo='QUI'`.
        Exibe os 3 multiplicadores de colocação (Quina/Quadra/Terno).

        🟡 INFERIDO — endpoint baseado no padrão de nomenclatura; não lido diretamente
      operationId: listarQuininha
      responses:
        "200":
          description: Lista de modalidades de Quininha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuininhaSeninhaMod"
              example:
                - id: 10
                  apresentacao: "Quininha 5 dezenas"
                  multiplicador: 5
                  multiplicadorColocacao01: 200.00
                  multiplicadorColocacao02: 50.00
                  multiplicadorColocacao03: 20.00
                  limitePalpite: 50.00
                  ativo: true
                  intJogo:
                    id: 3
                    descricao: "QUI"

    put:
      tags:
        - Quininha — Configuração
      summary: Atualizar modalidade de Quininha
      description: |
        Atualiza configuração de uma modalidade de Quininha (prêmios por colocação).

        🟡 INFERIDO — endpoint baseado no padrão de nomenclatura
      operationId: atualizarQuininhaModalidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuininhaSeninhaMod"
      responses:
        "200":
          description: Modalidade atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuininhaSeninhaMod"
        "404":
          description: Modalidade não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── QUININHA (RESULTADO) ────────────────────────────────────────────────────

  /api/quininha:
    get:
      tags:
        - Quininha — Resultado
      summary: Carregar sorteio aberto de Quininha
      description: |
        Retorna os dados do sorteio aberto atual de Quininha para a tela de resultado.
        Inclui o histórico dos últimos 10 resultados exibidos à direita na tela.

        🟢 CONFIRMADO — via quininha-resultado.service.ts (fluxo principal)
      operationId: buscarSorteioQuininha
      parameters:
        - name: data
          in: query
          required: false
          description: Data do sorteio (`yyyy-MM-dd`). Padrão implícito: data atual.
          schema:
            type: string
            format: date
            example: "2026-05-01"
      responses:
        "200":
          description: Sorteio de Quininha encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "404":
          description: Sem sorteio aberto de Quininha para a data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    put:
      tags:
        - Quininha — Resultado
      summary: Salvar resultado de Quininha (5 dezenas)
      description: |
        Registra os números sorteados em `mov_sorteio.numeros_sorteados`.

        ## Validações (feitas pelo frontend antes do PUT)

        1. **Hora:** `now() >= hora_sorteio` — caso contrário: "O sorteio só pode ser
           lançado após às HH:mm:ss"
        2. **Formato:** campo deve ter exatamente 14 chars: `DD,DD,DD,DD,DD` (5 pares)
        3. **Quantidade:** exatamente 5 dezenas de 2 dígitos

        **Auditoria:** após sucesso, cliente deve chamar `POST api/registerLog` com:
        `{acao: 'Quininha Resultado', historico: 'Salvar Resultado'}`

        🟢 CONFIRMADO — via quininha-resultado.component.ts
      operationId: salvarResultadoQuininha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultadoEspecialInput"
            example:
              sorteio_id: 200
              data: "2026-05-01"
              numeros: "01,15,22,34,47"
      responses:
        "200":
          description: Resultado de Quininha salvo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "422":
          description: Formato inválido ou hora não atingida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Sorteio já encerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/quininha/limpar:
    put:
      tags:
        - Quininha — Resultado
      summary: Limpar resultado de Quininha
      description: |
        Apaga `numeros_sorteados` do sorteio — volta ao estado "aguardando resultado".
        Requer confirmação no frontend antes de chamar.
        Auditoria: `{acao: 'Quininha Resultado', historico: 'Limpar Resultado'}`

        🟡 INFERIDO — padrão análogo ao ResultadoJb (`api/limparjb`)
      operationId: limparResultadoQuininha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Resultado limpo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "409":
          description: Sorteio já encerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/quininha/fechar:
    put:
      tags:
        - Quininha — Resultado
      summary: Fechar sorteio de Quininha (dispara trigger)
      description: |
        Altera `situacao` para `'F'`. PostgreSQL dispara:
        `trg_mv_sorteio_verifica_ganhadores_qui_sen` — calcula prêmios Quininha.

        Requer confirmação no frontend.
        Auditoria: `{acao: 'Quininha Resultado', historico: 'Encerrar Resultado'}`

        🟢 CONFIRMADO — via quininha-resultado.component.ts (fechar flow)
      operationId: fecharSorteioQuininha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Sorteio de Quininha encerrado e trigger disparada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "422":
          description: Sem números sorteados — não pode fechar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── SENINHA ─────────────────────────────────────────────────────────────────

  /api/seninhamodalidade:
    get:
      tags:
        - Seninha — Configuração
      summary: Listar modalidades de Seninha
      description: |
        Retorna modalidades de Seninha filtradas de `cad_modalidade` por `int_jogo.codigo='SEN'`.
        Exibe os 3 multiplicadores de colocação (Sena/Quina/Quadra).

        🟡 INFERIDO
      operationId: listarSeninha
      responses:
        "200":
          description: Lista de modalidades de Seninha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuininhaSeninhaMod"

    put:
      tags:
        - Seninha — Configuração
      summary: Atualizar modalidade de Seninha
      description: 🟡 INFERIDO
      operationId: atualizarSeninhaModalidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuininhaSeninhaMod"
      responses:
        "200":
          description: Modalidade atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuininhaSeninhaMod"

  /api/seninha:
    get:
      tags:
        - Seninha — Resultado
      summary: Carregar sorteio aberto de Seninha
      description: |
        Análogo ao `GET api/quininha` mas para Seninha (6 dezenas).
        🟢 CONFIRMADO — via seninha-resultado.service.ts
      operationId: buscarSorteioSeninha
      parameters:
        - name: data
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sorteio de Seninha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

    put:
      tags:
        - Seninha — Resultado
      summary: Salvar resultado de Seninha (6 dezenas)
      description: |
        Formato exigido: `DD,DD,DD,DD,DD,DD` — exatamente 6 dezenas (17 chars).
        Validação de hora: `now() >= hora_sorteio`.
        Auditoria: `{acao: 'Seninha Resultado', historico: 'Salvar Resultado'}` 🟡

        🟢 CONFIRMADO — via seninha-resultado.component.ts
      operationId: salvarResultadoSeninha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultadoEspecialInput"
            example:
              sorteio_id: 201
              data: "2026-05-01"
              numeros: "01,15,22,34,47,58"
      responses:
        "200":
          description: Resultado de Seninha salvo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "422":
          description: Formato inválido ou hora não atingida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/seninha/limpar:
    put:
      tags:
        - Seninha — Resultado
      summary: Limpar resultado de Seninha
      description: 🟡 INFERIDO — mesmo padrão da Quininha
      operationId: limparResultadoSeninha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Resultado limpo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

  /api/seninha/fechar:
    put:
      tags:
        - Seninha — Resultado
      summary: Fechar sorteio de Seninha
      description: |
        Aciona `trg_mv_sorteio_verifica_ganhadores_qui_sen` — mesma trigger da Quininha.
        🟢 CONFIRMADO — mesma trigger documentada em CLAUDE.md
      operationId: fecharSorteioSeninha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Sorteio de Seninha encerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

  # ─── LOTINHA ─────────────────────────────────────────────────────────────────

  /api/lotinhamodalidade:
    get:
      tags:
        - Lotinha — Configuração
      summary: Listar modalidades de Lotinha
      description: |
        Retorna modalidades de Lotinha filtradas de `cad_modalidade` por `int_jogo.codigo='LOT'`.
        Exibe: cotação única (`multiplicadorColocacao01`) + `limitePalpite`.
        Lotinha tem cotação única — sem colocações 2 e 3.

        🟡 INFERIDO
      operationId: listarLotinha
      responses:
        "200":
          description: Lista de modalidades de Lotinha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LotinhaMod"
              example:
                - id: 15
                  apresentacao: "Lotinha 15 dezenas"
                  multiplicador: 15
                  multiplicadorColocacao01: 1500.00
                  limitePalpite: 30.00
                  ativo: true
                  intJogo:
                    id: 6
                    descricao: "LOT"

    put:
      tags:
        - Lotinha — Configuração
      summary: Atualizar modalidade de Lotinha
      description: 🟡 INFERIDO
      operationId: atualizarLotinhaModalidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LotinhaMod"
      responses:
        "200":
          description: Modalidade atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotinhaMod"

  /api/lotinha:
    get:
      tags:
        - Lotinha — Resultado
      summary: Carregar sorteio aberto de Lotinha
      description: |
        Análogo ao `GET api/quininha` mas para Lotinha (15 dezenas).
        🟢 CONFIRMADO — via lotinha-resultado.service.ts
      operationId: buscarSorteioLotinha
      parameters:
        - name: data
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sorteio de Lotinha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

    put:
      tags:
        - Lotinha — Resultado
      summary: Salvar resultado de Lotinha (15 dezenas)
      description: |
        Formato exigido: 15 dezenas de 2 dígitos separadas por vírgula (44 chars).
        Validação adicional: `invalidConfiguration()` — verifica configuração antes de salvar.
        Auditoria: `{acao: 'Lotinha Resultado', historico: 'Salvar Resultado'}` 🟡
        Trigger ao fechar: `trg_mv_sorteio_verifica_ganhadores_lotinha`.

        🟢 CONFIRMADO — via lotinha-resultado.component.ts
      operationId: salvarResultadoLotinha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultadoEspecialInput"
            example:
              sorteio_id: 202
              data: "2026-05-01"
              numeros: "01,02,03,04,05,06,07,08,09,10,11,12,13,14,15"
      responses:
        "200":
          description: Resultado de Lotinha salvo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"
        "422":
          description: Formato inválido, hora não atingida ou configuração inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/lotinha/limpar:
    put:
      tags:
        - Lotinha — Resultado
      summary: Limpar resultado de Lotinha
      description: 🟡 INFERIDO — mesmo padrão da Quininha
      operationId: limparResultadoLotinha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Resultado limpo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

  /api/lotinha/fechar:
    put:
      tags:
        - Lotinha — Resultado
      summary: Fechar sorteio de Lotinha
      description: |
        Aciona `trg_mv_sorteio_verifica_ganhadores_lotinha` — trigger específica da Lotinha.
        🟢 CONFIRMADO — documentada em CLAUDE.md
      operationId: fecharSorteioLotinha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorteioActionInput"
      responses:
        "200":
          description: Sorteio de Lotinha encerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SorteioEspecial"

  # ─── MILHAR PREMIADA ─────────────────────────────────────────────────────────

  /api/milharpremiada:
    get:
      tags:
        - Milhar Premiada — Configuração
      summary: Listar modalidades de Milhar Premiada
      description: |
        Retorna modalidades de Milhar Premiada filtradas de `cad_modalidade`
        por tipo de jogo `MBP` 🟡. Exibe 5 multiplicadores de colocação.

        Sem paginação — lista completa (número pequeno de registros seed).
        Sem botão Criar — somente edição de registros pré-existentes.

        > **Sem auditoria `register_log`** — lacuna documentada vs. padrão do sistema. 🔴

        🟢 CONFIRMADO — via milhar-premiada.service.ts (resourceUrl = 'api/milharpremiada')
      operationId: listarMilharPremiada
      responses:
        "200":
          description: Lista de modalidades de Milhar Premiada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MilharPremiadaMod"
              example:
                - id: 20
                  apresentacao: "Milhar Premiada"
                  multiplicador: 1.00
                  multiplicadorColocacao01: 500.00
                  multiplicadorColocacao02: 300.00
                  multiplicadorColocacao03: 200.00
                  multiplicadorColocacao04: 100.00
                  multiplicadorColocacao05: 50.00
                  limitePalpite: 50.00
                  limiteDescarga: 200.00
                  limiteAceite: 400.00
                  ativo: true
                  intJogo:
                    id: 7
                    descricao: "MBP"

    put:
      tags:
        - Milhar Premiada — Configuração
      summary: Atualizar modalidade de Milhar Premiada
      description: |
        Atualiza campos de configuração de uma modalidade de Milhar Premiada.
        Após salvar com sucesso, o frontend recarrega toda a lista via `ngOnInit()`.

        **Campos obrigatórios:** `apresentacao`, `multiplicador` e todos os 5
        `multiplicadorColocacao01..05`.

        > **Sem auditoria:** este endpoint não dispara `register_log` — comportamento
        > herdado do Java. Recomendar adicionar no Zooloo. 🔴

        🟢 CONFIRMADO — via milhar-premiada.service.ts (update method)
      operationId: atualizarMilharPremiada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilharPremiadaMod"
            example:
              id: 20
              apresentacao: "Milhar Premiada"
              multiplicador: 1.00
              multiplicadorColocacao01: 600.00
              multiplicadorColocacao02: 350.00
              multiplicadorColocacao03: 200.00
              multiplicadorColocacao04: 100.00
              multiplicadorColocacao05: 50.00
              limitePalpite: 50.00
              limiteDescarga: 200.00
              limiteAceite: 400.00
              ativo: true
      responses:
        "200":
          description: Modalidade atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilharPremiadaMod"
        "422":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:

    BilhetinhoModalidade:
      type: object
      description: |
        Modalidade de Bilhetinho — objeto agregado com os 5 multiplicadores de colocação.
        O banco armazena uma linha por colocação em `cad_modalidade_bilhetinho`
        (PK composta `modalidade_id + colocacao`) — a API agrega para este formato.
      properties:
        id:
          type: integer
          example: 1
        apresentacao:
          type: string
          description: Nome de exibição da modalidade
          example: "Bilhetinho Milhar"
        multiplicador:
          type: number
          format: double
          description: Valor/preço do bilhete em BRL
          example: 1.00
        multiplicador01:
          type: number
          format: double
          description: Prêmio da 1ª colocação em BRL
          example: 4000.00
        multiplicador02:
          type: number
          format: double
          description: Prêmio da 2ª colocação em BRL
          example: 2000.00
        multiplicador03:
          type: number
          format: double
          description: Prêmio da 3ª colocação em BRL
          example: 1000.00
        multiplicador04:
          type: number
          format: double
          description: Prêmio da 4ª colocação em BRL
          example: 500.00
        multiplicador05:
          type: number
          format: double
          description: Prêmio da 5ª colocação em BRL
          example: 250.00
        limitePalpite:
          type: number
          format: double
          description: Limite de aposta por palpite em BRL
          example: 100.00
        limiteDescarga:
          type: number
          format: double
          description: Limite de volume de apostas em BRL
          example: 500.00
        limiteAceite:
          type: number
          format: double
          description: Limite de aceitação em BRL
          example: 1000.00
        ordem:
          type: integer
          description: Ordem de exibição na lista
          example: 1
        ativo:
          type: boolean
          example: true
        intJogo:
          $ref: "#/components/schemas/IntJogoRef"

    QuininhaSeninhaMod:
      type: object
      description: |
        Modalidade de Quininha ou Seninha.
        Usa `cad_modalidade` com 3 multiplicadores de colocação.
        - Quininha: colocacao01=Quina / colocacao02=Quadra / colocacao03=Terno
        - Seninha: colocacao01=Sena / colocacao02=Quina / colocacao03=Quadra
      properties:
        id:
          type: integer
          example: 10
        apresentacao:
          type: string
          example: "Quininha 5 dezenas"
        multiplicador:
          type: integer
          description: Quantidade de dezenas apostadas
          example: 5
        multiplicadorColocacao01:
          type: number
          format: double
          description: Prêmio máximo (Quina para QUI / Sena para SEN) em BRL
          example: 200.00
        multiplicadorColocacao02:
          type: number
          format: double
          description: Prêmio da 2ª colocação (Quadra/Quina) em BRL
          example: 50.00
        multiplicadorColocacao03:
          type: number
          format: double
          description: Prêmio da 3ª colocação (Terno/Quadra) em BRL
          example: 20.00
        limitePalpite:
          type: number
          format: double
          example: 50.00
        ativo:
          type: boolean
          example: true
        intJogo:
          $ref: "#/components/schemas/IntJogoRef"

    LotinhaMod:
      type: object
      description: |
        Modalidade de Lotinha — cotação única (sem colocações 2 e 3).
        Exibe `limitePalpite` na lista (diferente de Quininha/Seninha).
      properties:
        id:
          type: integer
          example: 15
        apresentacao:
          type: string
          example: "Lotinha 15 dezenas"
        multiplicador:
          type: integer
          description: Quantidade de dezenas apostadas (15)
          example: 15
        multiplicadorColocacao01:
          type: number
          format: double
          description: Cotação única de prêmio em BRL
          example: 1500.00
        limitePalpite:
          type: number
          format: double
          description: Limite de aposta por palpite em BRL
          example: 30.00
        ativo:
          type: boolean
          example: true
        intJogo:
          $ref: "#/components/schemas/IntJogoRef"

    MilharPremiadaMod:
      type: object
      description: |
        Modalidade de Milhar Premiada — 5 multiplicadores de colocação na mesma linha
        de `cad_modalidade` (diferente do Bilhetinho que usa linhas separadas).
        Campos `multiplicadorColocacao04` e `05` ausentes no `Modalidade.php` atual — lacuna. 🔴
      properties:
        id:
          type: integer
          example: 20
        apresentacao:
          type: string
          example: "Milhar Premiada"
        multiplicador:
          type: number
          format: double
          description: Valor/preço do bilhete em BRL
          example: 1.00
        multiplicadorColocacao01:
          type: number
          format: double
          example: 500.00
        multiplicadorColocacao02:
          type: number
          format: double
          example: 300.00
        multiplicadorColocacao03:
          type: number
          format: double
          example: 200.00
        multiplicadorColocacao04:
          type: number
          format: double
          description: Ausente no `Modalidade.php` atual — adicionar ao Active Record 🔴
          example: 100.00
        multiplicadorColocacao05:
          type: number
          format: double
          description: Ausente no `Modalidade.php` atual — adicionar ao Active Record 🔴
          example: 50.00
        limitePalpite:
          type: number
          format: double
          example: 50.00
        limiteDescarga:
          type: number
          format: double
          example: 200.00
        limiteAceite:
          type: number
          format: double
          example: 400.00
        ativo:
          type: boolean
          example: true
        intJogo:
          $ref: "#/components/schemas/IntJogoRef"

    SorteioEspecial:
      type: object
      description: |
        Estado de um sorteio de jogo especial (Quininha/Seninha/Lotinha).
        Compartilha `mov_sorteio` com o JB — diferenciado pelo tipo de extração.
      properties:
        sorteio_id:
          type: integer
          example: 200
        sorteio_numero:
          type: integer
          description: Número sequencial do sorteio (readonly na tela)
          example: 1042
        data_sorteio:
          type: string
          format: date
          example: "2026-05-01"
        hora_sorteio:
          type: string
          description: Hora de divulgação do resultado (`HH:mm:ss`)
          example: "16:00:00"
        situacao:
          type: string
          enum: ["A", "F"]
          description: A=Aberto, F=Fechado
          example: "A"
        numeros_sorteados:
          type: string
          description: |
            Dezenas sorteadas como CSV.
            - Quininha: `"DD,DD,DD,DD,DD"` (5 pares)
            - Seninha: `"DD,DD,DD,DD,DD,DD"` (6 pares)
            - Lotinha: `"DD,DD,...,DD"` (15 pares)
          example: "01,15,22,34,47"

    ResultadoEspecialInput:
      type: object
      description: Payload para salvar resultado de jogo especial
      required:
        - sorteio_id
        - data
        - numeros
      properties:
        sorteio_id:
          type: integer
          example: 200
        data:
          type: string
          format: date
          example: "2026-05-01"
        numeros:
          type: string
          description: |
            Dezenas sorteadas como CSV — formato depende do jogo:
            - Quininha: 5 dezenas de 2 dígitos (`DD,DD,DD,DD,DD`)
            - Seninha: 6 dezenas (`DD,DD,DD,DD,DD,DD`)
            - Lotinha: 15 dezenas (`DD,DD,...,DD`)
          example: "01,15,22,34,47"

    SorteioActionInput:
      type: object
      description: Payload para limpar ou fechar sorteio de jogo especial
      required:
        - sorteio_id
        - data
      properties:
        sorteio_id:
          type: integer
          example: 200
        data:
          type: string
          format: date
          example: "2026-05-01"

    IntJogoRef:
      type: object
      description: Referência ao tipo de jogo (`int_jogo`)
      properties:
        id:
          type: integer
          example: 3
        descricao:
          type: string
          example: "QUI"

    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 422
        message:
          type: string
          example: "O sorteio só pode ser lançado após às 16:00:00"
