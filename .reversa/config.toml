# Reversa — Configuração do Projeto
# Este arquivo é gerenciado pelo instalador. Para customizações, edite config.user.toml

[project]
name = "zooloo"
version = "1.0.0"

[user]
name = "helder"
chat_language = "pt-br"
doc_language = "Português"

[output]
folder = "_reversa_sdd"

[agents]
installed = [
  "reversa",
  "reversa-scout",
  "reversa-archaeologist",
  "reversa-detective",
  "reversa-architect",
  "reversa-writer",
  "reversa-reviewer",
  "reversa-visor",
  "reversa-data-master",
  "reversa-design-system",
  "reversa-agents-help",
  "reversa-reconstructor"
]

[engines]
installed = [
  "claude-code"
]

[analysis]
answer_mode = "chat"
doc_level = "completo"
